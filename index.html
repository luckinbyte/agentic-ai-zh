<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Agentic AI 指南 —— 从基础到系统</title>
  <meta name="description" content="《The Hitchhiker's Guide to Agentic AI: From Foundations to Systems》简体中文翻译版">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        tags: 'none',
        processEscapes: true
      },
      svg: { fontCache: 'global' },
      startup: {
        typeset: false,
        ready: function () {
          MathJax.startup.defaultReady();
          if (window.__needTypeset) { MathJax.typesetPromise(); }
        }
      }
    };
    window.$docsify = {
      name: 'Agentic AI 指南',
      repo: 'https://github.com/luckinbyte/agentic-ai-zh',
      homepage: 'README.md',
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      relativePath: true,
      subMaxLevel: 3,
      auto2top: true,
      cornerExternalLinkTarget: '_blank',
      search: { placeholder: '搜索全书', noData: '未找到结果', depth: 3 },
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            if (window.MathJax && window.MathJax.typesetPromise) {
              window.MathJax.typesetPromise();
            } else {
              window.__needTypeset = true;
            }
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div id="app">正在加载电子书…</div>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
